<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jarvis Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070b12;
      --panel: #0c1320;
      --panel-border: #1b2a42;
      --text: #c7d6f3;
      --muted: #7f95be;
      --accent: #46d6ff;
      --accent-soft: rgba(70, 214, 255, 0.2);
      --danger: #ff7f9f;
      --user: #9df1ff;
      --jarvis: #c4ff9d;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 20% 0%, #101b2f 0%, var(--bg) 40%, #05070b 100%);
      color: var(--text);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .terminal {
      width: min(980px, 100%);
      height: min(92vh, 760px);
      background: linear-gradient(180deg, rgba(14, 22, 36, 0.95), rgba(8, 13, 22, 0.98));
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(70, 214, 255, 0.1) inset;
    }

    .terminal-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--panel-border);
      background: rgba(9, 15, 25, 0.8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .title {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(70, 214, 255, 0.45);
    }

    .status {
      font-size: 12px;
      color: var(--muted);
    }

    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: var(--panel-border) transparent;
    }

    .message {
      border: 1px solid var(--panel-border);
      background: rgba(10, 16, 26, 0.7);
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message .role {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .message.user {
      border-color: rgba(157, 241, 255, 0.35);
      background: rgba(26, 45, 56, 0.35);
    }

    .message.user .role {
      color: var(--user);
    }

    .message.jarvis {
      border-color: rgba(196, 255, 157, 0.28);
      background: rgba(35, 49, 33, 0.35);
    }

    .message.jarvis .role {
      color: var(--jarvis);
    }

    .message.system {
      border-style: dashed;
      color: var(--muted);
    }

    .composer {
      border-top: 1px solid var(--panel-border);
      background: rgba(8, 13, 22, 0.94);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    .composer input {
      width: 100%;
      border: 1px solid var(--panel-border);
      background: #0a111d;
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .composer input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .composer button {
      border: 1px solid rgba(70, 214, 255, 0.45);
      background: linear-gradient(180deg, rgba(30, 104, 128, 0.45), rgba(15, 56, 71, 0.65));
      color: #d9f7ff;
      border-radius: 10px;
      padding: 0 18px;
      font: inherit;
      font-weight: 600;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease, opacity 0.12s ease;
    }

    .composer button:hover:enabled {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }

    .composer button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .error {
      color: var(--danger);
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
      }

      .terminal {
        height: 100vh;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <main class="terminal">
    <header class="terminal-header">
      <div class="title">Jarvis Interface</div>
      <div id="status" class="status">Idle</div>
    </header>

    <section id="chatWindow" class="chat-window" aria-live="polite"></section>

    <form id="chatForm" class="composer" autocomplete="off">
      <input id="messageInput" name="message" type="text" placeholder="Type your message..." maxlength="4000" required>
      <button id="sendButton" type="submit">Send</button>
    </form>
  </main>

  <script>
    (function () {
      const API_URL = 'http://192.168.0.117:3001/api/chat';

      const chatWindow = document.getElementById('chatWindow');
      const chatForm = document.getElementById('chatForm');
      const messageInput = document.getElementById('messageInput');
      const sendButton = document.getElementById('sendButton');
      const statusEl = document.getElementById('status');

      function setStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.classList.toggle('error', Boolean(isError));
      }

      function appendMessage(role, text) {
        const item = document.createElement('article');
        item.className = 'message ' + role;

        const roleEl = document.createElement('span');
        roleEl.className = 'role';
        roleEl.textContent = role === 'user' ? 'You' : role === 'jarvis' ? 'Jarvis' : 'System';

        const textEl = document.createElement('div');
        textEl.textContent = text;

        item.appendChild(roleEl);
        item.appendChild(textEl);
        chatWindow.appendChild(item);
        chatWindow.scrollTop = chatWindow.scrollHeight;
      }

      async function sendMessage(message) {
        const res = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: message })
        });

        let payload = null;
        try {
          payload = await res.json();
        } catch (_) {
          payload = null;
        }

        if (!res.ok) {
          const detail = payload && payload.error ? payload.error : 'Request failed';
          throw new Error(detail + ' (HTTP ' + res.status + ')');
        }

        if (!payload || typeof payload.response !== 'string') {
          throw new Error('Unexpected response format from Jarvis API');
        }

        return payload.response;
      }

      chatForm.addEventListener('submit', async function (event) {
        event.preventDefault();
        const message = messageInput.value.trim();
        if (!message) return;

        appendMessage('user', message);
        messageInput.value = '';
        messageInput.focus();

        sendButton.disabled = true;
        setStatus('Thinking...');

        try {
          const response = await sendMessage(message);
          appendMessage('jarvis', response);
          setStatus('Idle');
        } catch (error) {
          appendMessage('system', 'Error: ' + error.message);
          setStatus('Connection issue', true);
        } finally {
          sendButton.disabled = false;
        }
      });

      appendMessage('system', 'Jarvis terminal online. Enter a message to begin.');
    })();
  </script>
</body>
</html>
