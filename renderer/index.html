<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jarvis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070b12;
      --panel: #0c1320;
      --panel-border: #1b2a42;
      --text: #c7d6f3;
      --muted: #7f95be;
      --accent: #46d6ff;
      --accent-soft: rgba(70, 214, 255, 0.2);
      --danger: #ff7f9f;
      --user: #9df1ff;
      --jarvis: #c4ff9d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      background: radial-gradient(circle at 20% 0%, #101b2f 0%, var(--bg) 40%, #05070b 100%);
      color: var(--text);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    body { display: flex; align-items: center; justify-content: center; padding: 20px; }
    .terminal {
      width: min(980px, 100%);
      height: min(92vh, 760px);
      background: linear-gradient(180deg, rgba(14, 22, 36, 0.95), rgba(8, 13, 22, 0.98));
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 70px rgba(0, 0, 0, 0.55), 0 0 0 1px rgba(70, 214, 255, 0.1) inset;
    }
    .terminal-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--panel-border);
      background: rgba(9, 15, 25, 0.8);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .title {
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(70, 214, 255, 0.45);
    }
    .status { font-size: 12px; color: var(--muted); }
    .chat-window {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #chatScreen {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .message {
      border: 1px solid var(--panel-border);
      background: rgba(10, 16, 26, 0.7);
      border-radius: 10px;
      padding: 10px 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .message .role {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .message.user { border-color: rgba(157, 241, 255, 0.35); background: rgba(26, 45, 56, 0.35); }
    .message.user .role { color: var(--user); }
    .message.jarvis { border-color: rgba(196, 255, 157, 0.28); background: rgba(35, 49, 33, 0.35); }
    .message.jarvis .role { color: var(--jarvis); }
    .message.system { border-style: dashed; color: var(--muted); }
    .composer {
      border-top: 1px solid var(--panel-border);
      background: rgba(8, 13, 22, 0.94);
      padding: 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }
    .composer input,
    .composer select {
      width: 100%;
      border: 1px solid var(--panel-border);
      background: #0a111d;
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
      font: inherit;
      outline: none;
    }
    .composer button {
      border: 1px solid rgba(70, 214, 255, 0.45);
      background: linear-gradient(180deg, rgba(30, 104, 128, 0.45), rgba(15, 56, 71, 0.65));
      color: #d9f7ff;
      border-radius: 10px;
      padding: 0 18px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
    }
    .composer button:disabled { opacity: 0.45; cursor: not-allowed; }
    .error { color: var(--danger); }
  </style>
</head>
<body>
  <main class="terminal">
    <header class="terminal-header">
      <div class="title">Jarvis Interface</div>
      <div id="status" class="status">Idle</div>
    </header>
    <section id="bootstrapScreen" class="chat-window" aria-live="polite"></section>
    <section id="setupScreen" class="chat-window" aria-live="polite" hidden>
      <article class="message system">
        <span class="role">First Run Setup</span>
        <div>Tell Jarvis who you are so your local memory starts with useful context.</div>
      </article>
      <form id="setupForm" class="composer" autocomplete="off">
        <input id="nameInput" type="text" placeholder="Your name" maxlength="120" required>
        <select id="toneInput">
          <option value="balanced">Balanced tone</option>
          <option value="direct">Direct tone</option>
          <option value="friendly">Friendly tone</option>
        </select>
        <select id="verbosityInput">
          <option value="normal">Normal detail</option>
          <option value="concise">Concise</option>
          <option value="detailed">Detailed</option>
        </select>
        <button id="setupButton" type="submit">Finish Setup</button>
      </form>
    </section>
    <section id="chatScreen" hidden>
      <section id="chatWindow" class="chat-window" aria-live="polite"></section>
      <form id="chatForm" class="composer" autocomplete="off">
        <input id="messageInput" name="message" type="text" placeholder="Type your message..." maxlength="4000" required>
        <button id="sendButton" type="submit">Send</button>
      </form>
    </section>
  </main>
  <script src="./renderer.js"></script>
</body>
</html>
